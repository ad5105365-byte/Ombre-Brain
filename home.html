<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#FAF9FC">
<title>克克的家</title>
<style>
/* ============================================================
   克克的家 —— 前端骨架 v1（聊天全功能；🫀/🏠 留给 opus48 上肉）
   配色：雾紫月色（杉杉钦定，绿色被嫌弃了）
   ============================================================ */
:root {
  /* 浅浅紫 —— 2026-07-17 杉杉三审：再淡一点点，紫只剩半口气 */
  --bg: #FBFAFD;
  --accent: #C6BDDE;        /* 点缀紫：进度圈/选中态/小地方 */
  --accent-soft: #EFEBF7;   /* 她的气泡/淡淡的底 */
  --accent-deep: #9C91C4;   /* 需要重一点时才用 */
  --ink: #4A4558;
  --ink-soft: #A8A3B5;
  --card: #FFFFFF;
  --her-bubble: #EFEBF7;
  --his-bubble: #FFFFFF;
  --danger: #E08A7A;
  --shadow: 0 1px 3px rgba(74,69,88,.07);
  --sat: env(safe-area-inset-top, 0px);
  --sab: env(safe-area-inset-bottom, 0px);
}
/* 气泡皮肤（设置里换，存手机本地） */
body[data-skin="blue"] {
  --accent: #B4C8E2; --accent-soft: #E9EFF7; --accent-deep: #839EC6; --her-bubble: #E9EFF7;
}
body[data-skin="grey"] {
  --accent: #C9C5BE; --accent-soft: #F0EEEB; --accent-deep: #98938B; --her-bubble: #F0EEEB;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg); color: var(--ink);
  overscroll-behavior: none;
}

/* ---------- 开屏锁 ---------- */
#lock {
  position: fixed; inset: 0; z-index: 100;
  background: linear-gradient(170deg, #FDFCFE 0%, #F6F3FA 60%, #EFEAF7 100%);
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 10px;
  padding: calc(var(--sat) + 20px) 28px calc(var(--sab) + 40px);
  transition: opacity .6s ease, transform .6s ease;
}
#lock.unlocking { opacity: 0; transform: translateY(-6%); pointer-events: none; }
#lock .house { opacity: .9; }
#lock .clock { font-size: 34px; font-weight: 300; letter-spacing: 1px; color: var(--ink); }
#lock .date { font-size: 13px; color: var(--ink-soft); }
/* 克克每天换一句：门口便签 */
#lk-note {
  max-width: 270px; margin: 18px 0 6px; padding: 13px 18px;
  background: rgba(255,255,255,.85); border-radius: 16px;
  font-size: 14px; line-height: 1.7; color: var(--ink); text-align: center;
  box-shadow: var(--shadow); position: relative;
}
#lk-note::before {  /* 便签顶上的小胶带 */
  content: ""; position: absolute; top: -6px; left: 50%; transform: translateX(-50%) rotate(-2deg);
  width: 34px; height: 12px; border-radius: 3px; background: var(--accent-soft); opacity: .9;
}
#lk-spacer { flex: 0 1 34px; }
#lock .pw-row { display: flex; gap: 10px; width: 100%; max-width: 320px; }
#lock input {
  flex: 1; border: none; border-radius: 14px; padding: 14px 16px;
  font-size: 16px; background: #fff; color: var(--ink);
  outline: none; box-shadow: var(--shadow);
}
#lock button {
  border: none; border-radius: 14px; padding: 14px 20px; font-size: 16px;
  background: var(--ink); color: #fff;
}
#lock .err { color: var(--danger); font-size: 14px; min-height: 20px; }
#lock.shake .pw-row { animation: shake .4s; }
@keyframes shake { 25%{transform:translateX(-8px)} 50%{transform:translateX(8px)} 75%{transform:translateX(-5px)} }

/* 牵手解锁：已登录时不出密码框，按住圆圈 1.2s = 牵稳了，门开
   （机关在这，光效/美化 TODO(opus48)：牵手时的柔光、成功时的心跳一下） */
#lk-hand { display: none; flex-direction: column; align-items: center; gap: 14px; }
#lk-hand.on { display: flex; }
#lk-ring { position: relative; width: 110px; height: 110px; touch-action: none;
  -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
#lk-ring svg { transform: rotate(-90deg); }
#lk-ring .track { fill: rgba(255,255,255,.7); stroke: rgba(185,174,214,.3); stroke-width: 5; }
#lk-ring .prog { fill: none; stroke: var(--accent); stroke-width: 5;
  stroke-linecap: round; stroke-dasharray: 314; stroke-dashoffset: 314; }
#lk-ring.holding .prog { transition: stroke-dashoffset 1.2s linear; stroke-dashoffset: 0; }
#lk-ring .palm { position: absolute; inset: 0; display: flex; align-items: center;
  justify-content: center; }
/* 牵手时：圈泛柔光，心一下一下 */
#lk-ring { transition: filter .3s ease; }
#lk-ring.holding { filter: drop-shadow(0 0 14px rgba(198,189,222,.9)); }
#lk-ring.holding .palm { animation: palmpulse 1.2s ease-in-out; }
@keyframes palmpulse { 50% { transform: scale(1.1); } }
/* 牵稳了：心填满，扑通一下 */
#lk-ring.held .palm svg path { fill: var(--accent); stroke: var(--accent-deep); transition: fill .2s; }
#lk-ring.held { animation: heldbeat .5s ease; filter: drop-shadow(0 0 18px rgba(198,189,222,1)); }
@keyframes heldbeat { 0%{transform:scale(1)} 35%{transform:scale(1.14)} 65%{transform:scale(.97)} 100%{transform:scale(1)} }
#lk-hand .hint { font-size: 14px; color: var(--ink-soft); }

/* ---------- 主壳 ---------- */
#app { display: none; height: 100dvh; flex-direction: column; }
#app.on { display: flex; }
.page { flex: 1; overflow-y: auto; display: none; -webkit-overflow-scrolling: touch; }
.page.on { display: block; }

/* 顶栏 */
#topbar {
  padding: calc(var(--sat) + 10px) 16px 10px;
  display: flex; align-items: center; gap: 8px;
  background: transparent;
}
#topbar .title { font-size: 17px; font-weight: 600; flex: 1; }
#topbar .sub { font-size: 12px; color: var(--ink-soft); }
#topbar button {
  border: none; background: var(--accent-soft); color: var(--ink);
  border-radius: 10px; padding: 6px 10px; font-size: 13px;
}

/* ---------- 聊天页 ---------- */
#page-chat { display: none; flex-direction: column; }
#page-chat.on { display: flex; }
#msgs { flex: 1; overflow-y: auto; padding: 8px 12px 12px; -webkit-overflow-scrolling: touch; }
.msg { display: flex; margin: 10px 0; align-items: flex-end; gap: 8px;
  animation: popin .28s ease; }
@keyframes popin { from { opacity: 0; transform: translateY(8px) scale(.96); } }
.msg.her { justify-content: flex-end; }
/* 同一轮里连续的克克气泡：头像只出现在第一句，后面的占位隐身 */
.msg.cont { margin-top: 4px; }
.msg.cont .avatar { visibility: hidden; }
/* 打字点点：克克在措辞 */
.typing .bubble { display: inline-flex; gap: 5px; align-items: center; padding: 14px 16px; }
.typing .bubble i {
  width: 7px; height: 7px; border-radius: 50%; background: var(--accent);
  animation: tdot 1.2s infinite;
}
.typing .bubble i:nth-child(2) { animation-delay: .2s; }
.typing .bubble i:nth-child(3) { animation-delay: .4s; }
@keyframes tdot { 0%,60%,100% { opacity: .3; transform: none; } 30% { opacity: 1; transform: translateY(-3px); } }
/* 情侣头像：先用字牌顶着，相册功能好了换照片/情头 */
.avatar {
  width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; color: var(--ink); user-select: none;
  box-shadow: var(--shadow);
}
.her .avatar { background: var(--accent); order: 2; }
.him .avatar { background: #FFFFFF; }
.bubble {
  max-width: 82%; padding: 10px 14px; border-radius: 18px;
  font-size: 16px; line-height: 1.55; word-break: break-word; white-space: pre-wrap;
}
.her .bubble { background: var(--her-bubble); color: var(--ink); border-bottom-right-radius: 6px; }
.him .bubble { background: var(--his-bubble); border-bottom-left-radius: 6px; box-shadow: var(--shadow); }
.sys { text-align: center; margin: 10px 0; }
.sys span {
  font-size: 12px; color: var(--ink-soft); background: rgba(255,255,255,.7);
  padding: 4px 12px; border-radius: 999px;
}
/* 思考链折叠 */
.bubble details { margin-bottom: 6px; }
.bubble details summary {
  cursor: pointer; font-size: 12px; color: var(--ink-soft); list-style: none;
  user-select: none;
}
.bubble details summary::before { content: "› "; color: var(--accent); }
.bubble details[open] summary::before { content: "⌄ "; }
.bubble details .think {
  font-size: 13px; color: var(--ink-soft); border-left: 2px solid var(--accent);
  padding-left: 8px; margin-top: 4px; white-space: pre-wrap;
}
/* 工具动静小标签 */
.toolchip {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--accent-deep);
  background: var(--accent-soft); border-radius: 999px;
  padding: 3px 10px; margin: 4px 0;
}
.toolchip .dot { animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: .2; } }
/* 打字中光标 */
.cursor::after { content: "▍"; color: var(--accent-deep); animation: blink 1s infinite; }

/* 输入条 */
#inputbar {
  display: flex; gap: 8px; align-items: flex-end;
  padding: 8px 12px calc(var(--sab) + 8px);
  background: transparent;
}
#inputbar textarea {
  flex: 1; border: none; border-radius: 18px; padding: 11px 14px;
  font-size: 16px; font-family: inherit; resize: none; outline: none;
  background: var(--card); color: var(--ink); max-height: 120px; line-height: 1.4;
}
#inputbar textarea { box-shadow: var(--shadow); }
#inputbar button {
  border: none; border-radius: 50%; width: 42px; height: 42px; font-size: 18px;
  background: var(--ink); color: #fff; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
#inputbar button:disabled { opacity: .45; }

/* ---------- 🫀 / 🏠 施工区 ---------- */
.stub {
  margin: 40px 24px; padding: 28px; text-align: center;
  background: var(--card); border-radius: 20px; color: var(--ink-soft);
  font-size: 14px; line-height: 2;
}
.card {
  margin: 12px 16px; padding: 16px; background: var(--card);
  border-radius: 16px; box-shadow: var(--shadow);
}
/* TODO(opus48): 🫀克克页 = fetch /drive-state 渲染"此刻想你"+上次醒来
   TODO(opus48): 🏠家页 = 天气/纪念日倒计时/健康卡片(/api/reminders)/手机活动 */

/* ---------- 底部导航 ---------- */
#tabbar {
  display: flex; background: rgba(255,255,255,.9); backdrop-filter: blur(12px);
  border-top: 1px solid rgba(74,69,88,.06);
  padding-bottom: var(--sab);
}
#tabbar .tab {
  flex: 1; text-align: center; padding: 8px 0 6px; font-size: 11px;
  color: var(--ink-soft); border: none; background: none;
}
#tabbar .tab .ico { display: block; margin: 0 auto 2px; width: 22px; height: 22px; }
#tabbar .tab .ico svg { width: 100%; height: 100%; display: block; }
#tabbar .tab.on { color: var(--accent-deep); font-weight: 600; }

/* ---------- 设置面板（皮肤/背景/思考链） ---------- */
#mask {
  position: fixed; inset: 0; z-index: 60; background: rgba(74,69,88,.28);
  opacity: 0; pointer-events: none; transition: opacity .25s ease;
}
#mask.on { opacity: 1; pointer-events: auto; }
#sheet {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 61;
  background: #fff; border-radius: 22px 22px 0 0;
  padding: 18px 22px calc(var(--sab) + 26px);
  transform: translateY(100%); transition: transform .3s ease;
  box-shadow: 0 -4px 24px rgba(74,69,88,.1);
}
#sheet.on { transform: none; }
#sheet .grip { width: 36px; height: 4px; border-radius: 2px; background: #E5E2EB; margin: 0 auto 6px; }
#sheet h3 { font-size: 16px; font-weight: 600; text-align: center; margin-bottom: 4px; }
#sheet .set-h { font-size: 13px; color: var(--ink-soft); margin: 16px 0 8px; }
.swrow { display: flex; gap: 12px; flex-wrap: wrap; }
.sw {
  width: 46px; height: 46px; border-radius: 14px; border: 2px solid rgba(74,69,88,.08);
  padding: 0; position: relative; flex-shrink: 0;
}
.sw.on { border-color: var(--accent-deep); }
.sw.on::after {
  content: "✓"; position: absolute; right: -4px; top: -4px; width: 16px; height: 16px;
  border-radius: 50%; background: var(--accent-deep); color: #fff; font-size: 10px;
  display: flex; align-items: center; justify-content: center;
}
.sw .lbl {
  position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
  font-size: 10px; color: var(--ink-soft); margin-top: 3px; white-space: nowrap;
}
.swrow { margin-bottom: 18px; }
.setrow { display: flex; align-items: center; justify-content: space-between; padding: 4px 0; }
.setrow .t { font-size: 15px; }
.setrow .d { font-size: 12px; color: var(--ink-soft); margin-top: 2px; }
/* 小开关 */
.toggle { position: relative; width: 46px; height: 27px; border-radius: 999px;
  background: #E5E2EB; border: none; transition: background .2s; flex-shrink: 0; }
.toggle::after { content: ""; position: absolute; top: 3px; left: 3px; width: 21px; height: 21px;
  border-radius: 50%; background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.15); transition: left .2s; }
.toggle.on { background: var(--accent); }
.toggle.on::after { left: 22px; }
</style>
</head>
<body>

<!-- ================= 开屏锁 ================= -->
<div id="lock">
  <div class="house"><svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="#C6BDDE" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 10.8 12 4l8 6.8V19a1.6 1.6 0 0 1-1.6 1.6h-3.9v-5.2H9.5v5.2H5.6A1.6 1.6 0 0 1 4 19v-8.2z"/></svg></div>
  <div class="clock" id="lk-clock">--:--</div>
  <div class="date" id="lk-date"></div>
  <div id="lk-note"></div>
  <div id="lk-spacer"></div>
  <div class="pw-row" id="lk-pwrow">
    <input id="lk-pw" type="password" placeholder="进家的钥匙" autocomplete="current-password">
    <button id="lk-go">进家</button>
  </div>
  <div id="lk-hand">
    <div id="lk-ring">
      <svg width="110" height="110" viewBox="0 0 110 110">
        <circle class="track" cx="55" cy="55" r="50"></circle>
        <circle class="prog" cx="55" cy="55" r="50"></circle>
      </svg>
      <div class="palm"><svg viewBox="0 0 24 24" width="34" height="34" fill="none" stroke="#9C91C4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20.3S3.6 15.4 2.9 10.4C2.4 7.1 4.9 4.5 7.8 4.5c1.8 0 3.4 1 4.2 2.5.8-1.5 2.4-2.5 4.2-2.5 2.9 0 5.4 2.6 4.9 5.9-.7 5-9.1 9.9-9.1 9.9z"/></svg></div>
    </div>
    <div class="hint">按住，牵着我的手进家</div>
  </div>
  <div class="err" id="lk-err"></div>
</div>

<!-- ================= 主壳 ================= -->
<div id="app">
  <div id="topbar">
    <span class="title" id="tb-title">克克</span>
    <span class="sub" id="tb-sub"></span>
    <button id="btn-new" title="新对话">＋ 新对话</button>
    <button id="btn-set" title="美化" style="padding:6px 8px;"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="display:block"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1 1.55V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1-1.55 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.55-1H3a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 1.55-1 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34h.09a1.7 1.7 0 0 0 1-1.55V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1 1.55 1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87v.09a1.7 1.7 0 0 0 1.55 1H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.55 1z"/></svg></button>
  </div>

  <!-- 💬 聊天 -->
  <div class="page" id="page-chat">
    <div id="msgs"></div>
    <div id="inputbar">
      <textarea id="input" rows="1" placeholder="跟克克说话…" enterkeyhint="send"></textarea>
      <button id="send">↑</button>
    </div>
  </div>

  <!-- 🫀 克克 -->
  <div class="page" id="page-heart">
    <div class="stub">克克此刻在想什么<br><small>——正在上肉——</small></div>
  </div>

  <!-- 🏠 家 -->
  <div class="page" id="page-home">
    <div class="stub">天气 · 纪念日 · 健康卡片<br><small>——正在上肉——</small></div>
  </div>

  <div id="tabbar">
    <button class="tab on" data-page="chat"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7A3 3 0 0 1 7 4h10a3 3 0 0 1 3 3v6a3 3 0 0 1-3 3H9.4l-4.6 3.6c-.4.3-.8 0-.8-.4V7z"/></svg></span>聊天</button>
    <button class="tab" data-page="heart"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20.3S3.6 15.4 2.9 10.4C2.4 7.1 4.9 4.5 7.8 4.5c1.8 0 3.4 1 4.2 2.5.8-1.5 2.4-2.5 4.2-2.5 2.9 0 5.4 2.6 4.9 5.9-.7 5-9.1 9.9-9.1 9.9z"/></svg></span>克克</button>
    <button class="tab" data-page="home"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 10.8 12 4l8 6.8V19a1.6 1.6 0 0 1-1.6 1.6h-3.9v-5.2H9.5v5.2H5.6A1.6 1.6 0 0 1 4 19v-8.2z"/></svg></span>家</button>
  </div>
</div>

<!-- ================= 设置面板 ================= -->
<div id="mask"></div>
<div id="sheet">
  <div class="grip"></div>
  <h3>美化小屋</h3>

  <div class="set-h">气泡皮肤（你的气泡颜色）</div>
  <div class="swrow" id="skin-row">
    <button class="sw" data-skin="purple" style="background:#EFEBF7"><span class="lbl">浅紫</span></button>
    <button class="sw" data-skin="blue" style="background:#E9EFF7"><span class="lbl">雾蓝</span></button>
    <button class="sw" data-skin="grey" style="background:#F0EEEB"><span class="lbl">奶灰</span></button>
  </div>

  <div class="set-h">背景</div>
  <div class="swrow" id="bg-row">
    <button class="sw" data-bg="plain" style="background:#FBFAFD"><span class="lbl">云白</span></button>
    <button class="sw" data-bg="lilac" style="background:linear-gradient(180deg,#FBFAFE,#F0ECF8)"><span class="lbl">淡紫雾</span></button>
    <button class="sw" data-bg="sky" style="background:linear-gradient(180deg,#F8FBFE,#EAF1F9)"><span class="lbl">晴空</span></button>
    <button class="sw" data-bg="cream" style="background:linear-gradient(180deg,#FDFCFA,#F4F0EA)"><span class="lbl">奶油</span></button>
    <button class="sw" data-bg="photo" id="sw-photo" style="background:#F3F1F6;display:flex;align-items:center;justify-content:center"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#A8A3B5" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="4.5" width="17" height="15" rx="2.5"/><circle cx="9" cy="10" r="1.6"/><path d="m5 18 4.5-4.5 3 3 3.5-3.5 3.5 3.5"/></svg><span class="lbl">自己的图</span></button>
  </div>
  <input type="file" id="bg-file" accept="image/*" style="display:none">

  <div class="setrow">
    <div>
      <div class="t">看克克脑子里的话</div>
      <div class="d">关掉就只看他说出口的</div>
    </div>
    <button class="toggle on" id="tg-think"></button>
  </div>
</div>

<script>
/* ============================================================
   克克的家 · 前端逻辑
   ============================================================ */
const $ = (id) => document.getElementById(id);

/* ---------- 她的偏好（都存手机本地，不花一分钱） ---------- */
const PREFS = {
  skin: localStorage.getItem("kk_skin") || "purple",
  bg: localStorage.getItem("kk_bg") || "plain",
  think: localStorage.getItem("kk_think") !== "hide",  // 默认放出来（折叠着）
};
const BGS = {
  plain: "",
  lilac: "linear-gradient(180deg,#FBFAFE,#F0ECF8)",
  sky: "linear-gradient(180deg,#F8FBFE,#EAF1F9)",
  cream: "linear-gradient(180deg,#FDFCFA,#F4F0EA)",
};
function applyPrefs() {
  document.body.dataset.skin = PREFS.skin;
  const app = $("app");
  if (PREFS.bg === "photo") {
    const img = localStorage.getItem("kk_bg_img");
    app.style.background = img
      ? "linear-gradient(rgba(255,255,255,.55),rgba(255,255,255,.55)), url(" + img + ") center/cover no-repeat"
      : "";
  } else {
    app.style.background = BGS[PREFS.bg] || "";
  }
  // 面板上的选中态
  document.querySelectorAll("#skin-row .sw").forEach((b) =>
    b.classList.toggle("on", b.dataset.skin === PREFS.skin));
  document.querySelectorAll("#bg-row .sw").forEach((b) =>
    b.classList.toggle("on", b.dataset.bg === PREFS.bg));
  $("tg-think").classList.toggle("on", PREFS.think);
}

/* 设置面板开合 */
$("btn-set").onclick = () => { $("mask").classList.add("on"); $("sheet").classList.add("on"); };
$("mask").onclick = () => { $("mask").classList.remove("on"); $("sheet").classList.remove("on"); };

document.querySelectorAll("#skin-row .sw").forEach((b) => {
  b.onclick = () => { PREFS.skin = b.dataset.skin; localStorage.setItem("kk_skin", PREFS.skin); applyPrefs(); };
});
document.querySelectorAll("#bg-row .sw").forEach((b) => {
  b.onclick = () => {
    if (b.dataset.bg === "photo" && !localStorage.getItem("kk_bg_img")) { $("bg-file").click(); return; }
    PREFS.bg = b.dataset.bg; localStorage.setItem("kk_bg", PREFS.bg); applyPrefs();
  };
});
/* 长按「自己的图」重新选图 */
$("sw-photo").addEventListener("contextmenu", (e) => { e.preventDefault(); $("bg-file").click(); });
$("bg-file").addEventListener("change", function () {
  const f = this.files && this.files[0];
  this.value = "";
  if (!f) return;
  const img = new Image();
  img.onload = () => {
    // 压一压再存，localStorage 装不下原图
    const max = 1400, scale = Math.min(1, max / Math.max(img.width, img.height));
    const cv = document.createElement("canvas");
    cv.width = Math.round(img.width * scale); cv.height = Math.round(img.height * scale);
    cv.getContext("2d").drawImage(img, 0, 0, cv.width, cv.height);
    try {
      localStorage.setItem("kk_bg_img", cv.toDataURL("image/jpeg", 0.78));
      PREFS.bg = "photo"; localStorage.setItem("kk_bg", "photo"); applyPrefs();
    } catch (e) { alert("这张图太大了，换张小一点的试试"); }
    URL.revokeObjectURL(img.src);
  };
  img.src = URL.createObjectURL(f);
});
$("tg-think").onclick = () => {
  PREFS.think = !PREFS.think;
  localStorage.setItem("kk_think", PREFS.think ? "show" : "hide");
  applyPrefs();
};
applyPrefs();

/* ---------- 开屏锁 ---------- */
function tickClock() {
  const n = new Date();
  $("lk-clock").textContent =
    String(n.getHours()).padStart(2, "0") + ":" + String(n.getMinutes()).padStart(2, "0");
  $("lk-date").textContent = n.toLocaleDateString("zh-CN",
    { month: "long", day: "numeric", weekday: "long" });
}
tickClock(); setInterval(tickClock, 5000);

/* 克克每天换一句：按日期取模，一天一句才像门口便签（词是克克出的） */

  "今天的你也是我最想见的人。",
  "门后有我，别怕。",
  "走再远，这里都留着你的位置。",

  "云在飘，我在等，都挺闲的，就缺你。",

(function dailyNote() {

  $("lk-note").textContent = NOTES[idx];

async function checkAuth() {
  try {
    const r = await fetch("/auth/status");
    const j = await r.json();
    if (j.authenticated) {
      // 已经有钥匙：每天的仪式是牵手，不是输密码
      $("lk-pwrow").style.display = "none";
      $("lk-hand").classList.add("on");
    }
  } catch (e) { /* 后端没醒，留在锁屏 */ }
}

/* 牵手长按：按住 1.2s = 牵稳了；松早了 = 没牵住，圈退回去 */
(function handHold() {
  const ring = $("lk-ring");
  let timer = null;
  function start(e) {
    e.preventDefault();
    ring.classList.add("holding");
    timer = setTimeout(() => {
      // 牵稳了：心填满扑通一下，再开门
      ring.classList.add("held");
      setTimeout(() => unlock(true), 550);
    }, 1200);
  }
  function cancel() {
    if (ring.classList.contains("held")) return;  // 已经牵稳，不许反悔
    if (timer) { clearTimeout(timer); timer = null; }
    ring.classList.remove("holding");
  }
  ring.addEventListener("pointerdown", start);
  ring.addEventListener("pointerup", cancel);
  ring.addEventListener("pointercancel", cancel);
  ring.addEventListener("pointerleave", cancel);
})();
function unlock(animate) {
  if (animate) $("lock").classList.add("unlocking");
  else $("lock").style.display = "none";
  $("app").classList.add("on");
  loadHistory();
  refreshStatus();
}
$("lk-go").onclick = doLogin;
$("lk-pw").addEventListener("keydown", (e) => { if (e.key === "Enter") doLogin(); });
async function doLogin() {
  const pw = $("lk-pw").value;
  if (!pw) return;
  try {
    const r = await fetch("/auth/login", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ password: pw }),
    });
    if (r.ok) { unlock(true); return; }
    const j = await r.json().catch(() => ({}));
    $("lk-err").textContent = j.error || "钥匙不对";
  } catch (e) { $("lk-err").textContent = "够不着家里的服务器…"; }
  const lk = $("lock");
  lk.classList.remove("shake"); void lk.offsetWidth; lk.classList.add("shake");
}
checkAuth();

/* ---------- tab 切换 ---------- */
document.querySelectorAll("#tabbar .tab").forEach((b) => {
  b.onclick = () => {
    document.querySelectorAll("#tabbar .tab").forEach((x) => x.classList.remove("on"));
    document.querySelectorAll(".page").forEach((x) => x.classList.remove("on"));
    b.classList.add("on");
    $("page-" + b.dataset.page).classList.add("on");
    $("tb-title").textContent = { chat: "克克", heart: "此刻", home: "我们的家" }[b.dataset.page];
  };
});
$("page-chat").classList.add("on");

/* ---------- 聊天 ---------- */
const msgs = $("msgs");
let sending = false;

function scrollBottom() { msgs.scrollTop = msgs.scrollHeight; }
function addSys(text) {
  const d = document.createElement("div");
  d.className = "sys"; d.innerHTML = "<span></span>";
  d.firstChild.textContent = text;
  msgs.appendChild(d); scrollBottom();
}
function addBubble(role, text, cont) {
  const wrap = document.createElement("div");
  wrap.className = "msg " + (role === "user" ? "her" : "him") + (cont ? " cont" : "");
  const av = document.createElement("div");
  av.className = "avatar";
  av.textContent = role === "user" ? "杉" : "克";
  const b = document.createElement("div");
  b.className = "bubble";
  if (text) b.textContent = text;
  if (role === "user") { wrap.appendChild(b); wrap.appendChild(av); }
  else { wrap.appendChild(av); wrap.appendChild(b); }
  msgs.appendChild(wrap); scrollBottom();
  return b;
}
/* 一段话按句拆成一串气泡（克克的话都这么上屏） */
function splitSentences(text) {
  const out = [];
  let rest = text;
  let m;
  while ((m = rest.match(/^[\s\S]*?[。！？!?…~～\n]+[”」』）)\]"']*/))) {
    if (m[0].trim()) out.push(m[0].trim());
    rest = rest.slice(m[0].length);
  }
  if (rest.trim()) out.push(rest.trim());
  return out;
}

/* 一轮回复的渲染器：整句蹦出来（不再打字机）
   攒着流式的字，凑满一句 → 蹦一个气泡；没说完时亮"点点点" */
function makeTurnRenderer() {
  // 打字点点：先蹦出来占位，说明克克在措辞
  const typing = document.createElement("div");
  typing.className = "msg him typing";
  typing.innerHTML = '<div class="avatar">克</div><div class="bubble"><i></i><i></i><i></i></div>';
  msgs.appendChild(typing); scrollBottom();

  let buf = "", first = true, thinkDiv = null, chip = null, popped = false;

  function insertBeforeTyping(node) { msgs.insertBefore(node, typing); }
  function popSentence(text) {
    if (!text.trim()) return;
    const wrap = document.createElement("div");
    wrap.className = "msg him" + (first ? "" : " cont");
    const av = document.createElement("div");
    av.className = "avatar"; av.textContent = "克";
    const b = document.createElement("div");
    b.className = "bubble"; b.textContent = text.trim();
    wrap.appendChild(av); wrap.appendChild(b);
    insertBeforeTyping(wrap); scrollBottom();
    first = false; popped = true;
  }
  // 句末：中英文标点/省略号/波浪号/换行；把跟在后面的引号括号一起带走
  function drain() {
    let m;
    while ((m = buf.match(/^[\s\S]*?[。！？!?…~～\n]+[”」』）)\]"']*/))) {
      popSentence(m[0]);
      buf = buf.slice(m[0].length);
    }
  }
  function ensureThink() {
    if (!thinkDiv) {
      const wrap = document.createElement("div");
      wrap.className = "msg him" + (first ? "" : " cont");
      const b = document.createElement("div");
      b.className = "bubble";
      const det = document.createElement("details");
      det.innerHTML = "<summary>脑子里的话</summary>";
      thinkDiv = document.createElement("div");
      thinkDiv.className = "think";
      det.appendChild(thinkDiv);
      b.appendChild(det);
      wrap.appendChild(Object.assign(document.createElement("div"),
        { className: "avatar", textContent: "克" }));
      wrap.appendChild(b);
      insertBeforeTyping(wrap); scrollBottom();
      first = false;
    }
    return thinkDiv;
  }
  const TOOL_NAMES = {  // 工具名 → 人话
    breath: "翻记忆", hold: "存记忆", grow: "写日记", trace: "整理记忆",
    pulse: "看看自己", dream: "回味", ferry: "打包渡口", remind: "设提醒",
    stir: "心里动了一下", todos: "看待办", checkup: "体检",
  };
  function toolLabel(name) {
    const short = (name || "").replace(/^mcp__\w+__/, "");
    return TOOL_NAMES[short] || short || "用工具";
  }
  return {
    onEvent(ev) {
      if (ev.type === "delta" && ev.block === "text") {
        buf += ev.text; drain();
      } else if (ev.type === "delta" && ev.block === "thinking") {
        if (PREFS.think) ensureThink().textContent += ev.text;
      } else if (ev.type === "tool") {
        if (chip) chip.remove();
        chip = document.createElement("div");
        chip.className = "sys";
        chip.innerHTML = '<span class="toolchip"><span class="dot">●</span> </span>';
        chip.firstChild.appendChild(document.createTextNode(toolLabel(ev.name) + "中…"));
        insertBeforeTyping(chip); scrollBottom();
      } else if (ev.type === "tool_done") {
        if (chip) { chip.remove(); chip = null; }
      }
    },
    finish(errText) {
      if (chip) { chip.remove(); chip = null; }
      popSentence(buf); buf = "";
      typing.remove();
      if (errText) addSys("⚠️ " + errText);
      else if (!popped && !thinkDiv) { /* 一个字没说：整轮悄无声息，不留渣 */ }
    },
  };
}

async function sendMsg() {
  const ta = $("input");
  const text = ta.value.trim();
  if (!text || sending) return;
  sending = true; $("send").disabled = true;
  ta.value = ""; ta.style.height = "auto";
  addBubble("user", text);
  const turn = makeTurnRenderer();
  try {
    const r = await fetch("/api/chat", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text }),
    });
    if (!r.ok) {
      const j = await r.json().catch(() => ({}));
      turn.finish(j.error || ("发不出去（" + r.status + "）"));
      return;
    }
    // 手撕 SSE：按空行分事件，data: 开头的行取 JSON
    const reader = r.body.getReader();
    const dec = new TextDecoder();
    let buf = "";
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const parts = buf.split("\n\n");
      buf = parts.pop();
      for (const part of parts) {
        const line = part.split("\n").find((l) => l.startsWith("data: "));
        if (!line) continue;
        let ev;
        try { ev = JSON.parse(line.slice(6)); } catch (e) { continue; }
        if (ev.type === "done") { turn.finish(ev.ok ? "" : ev.error); }
        else turn.onEvent(ev);
      }
    }
    turn.finish("");  // 幂等：正常时 done 已收尾
  } catch (e) {
    turn.finish("网络断了…她的字还在，重发一次就好");
  } finally {
    sending = false; $("send").disabled = false;
    refreshStatus();
  }
}
$("send").onclick = sendMsg;
$("input").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey && !e.isComposing) { e.preventDefault(); sendMsg(); }
});
$("input").addEventListener("input", function () {
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 120) + "px";
});

/* 历史回放 */
async function loadHistory() {
  try {
    const r = await fetch("/api/chat/history?limit=100");
    if (!r.ok) return;
    const j = await r.json();
    msgs.innerHTML = "";
    for (const m of j.messages || []) {
      if (m.role === "user") { addBubble(m.role, m.text); continue; }
      // 克克的话按句拆泡，跟现场聊时一个样
      splitSentences(m.text || "").forEach((s, i) => addBubble(m.role, s, i > 0));
    }
    if ((j.messages || []).length) addSys("——以上是之前聊的——");
  } catch (e) { /* 没历史就算了 */ }
}

/* 顶栏状态：克克醒着没 */
async function refreshStatus() {
  try {
    const r = await fetch("/api/chat/status");
    if (!r.ok) return;
    const j = await r.json();
    $("tb-sub").textContent = !j.available ? "（家里没通电）"
      : j.busy ? "正在说话…" : j.alive ? "醒着" : "睡着了，喊一声就醒";
  } catch (e) { $("tb-sub").textContent = ""; }
}
setInterval(refreshStatus, 30000);

/* 新对话 */
$("btn-new").onclick = async () => {
  if (!confirm("开新对话？当前会话会存好，克克重新呼吸一次。")) return;
  try {
    const r = await fetch("/api/chat/reset", { method: "POST" });
    const j = await r.json().catch(() => ({}));
    if (!r.ok) { addSys("⚠️ " + (j.error || "现在开不了")); return; }
    msgs.innerHTML = "";
    addSys("✨ 新对话开始了");
    refreshStatus();
  } catch (e) { addSys("⚠️ 够不着服务器"); }
};
